# ============================================================================
# Dujiao-Next NGINX Reverse Proxy — OWASP CRS + CIS / PCI-DSS hardened
# ============================================================================
# This file is the main NGINX configuration for production deployment.
# It serves as a reverse proxy for the API, user frontend, and admin frontend,
# with OWASP ModSecurity CRS WAF rules applied.
#
# Usage: Mount this file as /etc/nginx/nginx.conf in the nginx container.
# ============================================================================

# CIS 2.1 - Run as unprivileged user
user nginx;
worker_processes auto;
pid /var/run/nginx.pid;

# CIS 2.4 - Limit worker connections
events {
    worker_connections 1024;
    multi_accept on;
}

http {
    # ── Basic Settings ──────────────────────────────────────────
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # CIS 2.5.1 - Hide server version
    server_tokens off;

    # Performance
    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;

    # ── Timeouts (PCI-DSS 6.5.10 - DoS prevention) ─────────────
    keepalive_timeout     65;
    client_body_timeout   30;
    client_header_timeout 30;
    send_timeout          30;

    # ── Body size limits ────────────────────────────────────────
    client_max_body_size 20m;

    # ── Logging (PCI-DSS 10.1 - Audit trail) ───────────────────
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for" '
                      'rt=$request_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Gzip Compression ───────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ── Rate Limiting (OWASP / PCI-DSS 6.5.10) ────────────────
    # Global rate limit: 30 requests/second per IP
    limit_req_zone $binary_remote_addr zone=global:10m rate=30r/s;
    # API rate limit: 20 requests/second per IP
    limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;
    # Login rate limit: 5 requests/minute per IP
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
    # Static asset rate limit: 50 requests/second per IP
    limit_req_zone $binary_remote_addr zone=static:10m rate=50r/s;

    limit_req_status 429;

    # ── Upstream definitions ───────────────────────────────────
    upstream api_backend {
        server dujiao-api:8080;
        keepalive 32;
    }

    upstream user_frontend {
        server dujiao-user:80;
    }

    upstream admin_frontend {
        server dujiao-admin:80;
    }

    # ── ModSecurity WAF (OWASP CRS) ───────────────────────────
    # Enable if ModSecurity module is available
    # modsecurity on;
    # modsecurity_rules_file /etc/nginx/modsecurity/modsecurity.conf;

    # ================================================================
    # HTTP → HTTPS Redirect (Enable in production with real certs)
    # ================================================================
    # server {
    #     listen 80;
    #     server_name your-domain.com admin.your-domain.com;
    #     return 301 https://$host$request_uri;
    # }

    # ================================================================
    # User Frontend (Main Site)
    # ================================================================
    server {
        listen 80;
        # In production with TLS:
        # listen 443 ssl http2;
        server_name _;

        # ── TLS Configuration (PCI-DSS 4.1 - Encrypt transmissions) ──
        # Uncomment and configure when using real SSL certificates:
        # ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        # ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        # ssl_protocols       TLSv1.2 TLSv1.3;
        # ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        # ssl_prefer_server_ciphers on;
        # ssl_session_cache   shared:SSL:10m;
        # ssl_session_timeout 1d;
        # ssl_session_tickets off;
        # ssl_stapling        on;
        # ssl_stapling_verify on;

        # ── Security Headers (OWASP / PCI-DSS 6.5.7) ──────────────
        add_header X-Content-Type-Options    "nosniff" always;
        add_header X-Frame-Options           "SAMEORIGIN" always;
        add_header X-XSS-Protection          "1; mode=block" always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy         "camera=(), microphone=(), geolocation=(), payment=()" always;
        # Uncomment with TLS:
        # add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains; preload" always;

        # CSP - Content Security Policy (OWASP A7 / PCI-DSS 6.5.7)
        # Adjust 'script-src' if using external analytics/CDN scripts
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://challenges.cloudflare.com https://telegram.org; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self'; frame-src https://challenges.cloudflare.com https://oauth.telegram.org; object-src 'none'; base-uri 'self'; form-action 'self';" always;

        # ── API Proxy (/api/) ──────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=40 nodelay;

            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";

            # Timeouts
            proxy_connect_timeout 10s;
            proxy_read_timeout    60s;
            proxy_send_timeout    30s;

            # Buffer settings
            proxy_buffering on;
            proxy_buffer_size 8k;
            proxy_buffers 16 8k;
        }

        # ── Login endpoints - stricter rate limiting ───────────────
        location /api/v1/auth/login {
            limit_req zone=login burst=3 nodelay;

            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";
        }

        location /api/v1/admin/login {
            limit_req zone=login burst=3 nodelay;

            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";
        }

        # ── Uploaded files proxy ───────────────────────────────────
        location /uploads/ {
            limit_req zone=static burst=100 nodelay;

            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;

            # Cache static uploads
            proxy_cache_valid 200 1h;
            expires 1h;
            add_header Cache-Control "public, max-age=3600" always;
            add_header X-Content-Type-Options "nosniff" always;
        }

        # ── Payment callbacks (no rate limit — external providers) ─
        location /api/v1/payments/ {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";
        }

        # ── Static assets (JS/CSS/fonts — long cache) ─────────────
        location ^~ /assets/ {
            limit_req zone=static burst=100 nodelay;

            proxy_pass http://user_frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;

            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            add_header X-Content-Type-Options "nosniff" always;
        }

        # ── User Frontend (SPA fallback) ──────────────────────────
        location / {
            limit_req zone=global burst=60 nodelay;

            proxy_pass http://user_frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Health check ──────────────────────────────────────────
        location = /nginx-health {
            access_log off;
            add_header Content-Type text/plain;
            return 200 'ok';
        }

        # ── Block sensitive paths ─────────────────────────────────
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        location ~* \.(git|svn|env|bak|old|sql|conf|ini|log)$ {
            deny all;
            access_log off;
            log_not_found off;
        }
    }

    # ================================================================
    # Admin Frontend (Separate virtual host or path)
    # ================================================================
    server {
        listen 81;
        # In production with TLS:
        # listen 443 ssl http2;
        # server_name admin.your-domain.com;
        # (Copy TLS settings from above)

        # ── Security Headers ──────────────────────────────────────
        add_header X-Content-Type-Options    "nosniff" always;
        add_header X-Frame-Options           "DENY" always;
        add_header X-XSS-Protection          "1; mode=block" always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy         "camera=(), microphone=(), geolocation=(), payment=()" always;

        # Stricter CSP for admin panel
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self'; frame-src https://challenges.cloudflare.com; object-src 'none'; base-uri 'self'; form-action 'self';" always;

        # ── IP Restriction (PCI-DSS 7.1 - Restrict admin access) ──
        # Uncomment and set your admin IP whitelist:
        # allow 10.0.0.0/8;
        # allow 172.16.0.0/12;
        # allow 192.168.0.0/16;
        # deny all;

        # ── API Proxy ─────────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=40 nodelay;

            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";
        }

        # ── Admin login - strict rate limit ────────────────────────
        location /api/v1/admin/login {
            limit_req zone=login burst=2 nodelay;

            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";
        }

        # ── Uploaded files proxy ──────────────────────────────────
        location /uploads/ {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            add_header X-Content-Type-Options "nosniff" always;
        }

        # ── Admin static assets ───────────────────────────────────
        location ^~ /assets/ {
            limit_req zone=static burst=100 nodelay;

            proxy_pass http://admin_frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;

            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            add_header X-Content-Type-Options "nosniff" always;
        }

        # ── Admin Frontend (SPA fallback) ─────────────────────────
        location / {
            limit_req zone=global burst=30 nodelay;

            proxy_pass http://admin_frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Block sensitive paths ─────────────────────────────────
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
