# ============================================================================
# Dujiao-Next — NGINX 反向代理参考配置
# ============================================================================
#
# 这是一个参考配置文件，用于你自己部署的 NGINX。
# 请根据实际情况修改 server_name、SSL 证书路径、upstream 地址等。
#
# 前置条件：
#   - NGINX 已安装并运行
#   - API 后端运行在 127.0.0.1:8080
#   - User 前端静态文件部署在 /var/www/user/dist/
#   - Admin 前端静态文件部署在 /var/www/admin/dist/
#   - (可选) 已安装 ModSecurity + OWASP CRS
#
# 安装方法：
#   cp nginx/nginx.conf /etc/nginx/conf.d/dujiao.conf
#   nginx -t && nginx -s reload
# ============================================================================

# ── Rate Limiting (PCI-DSS 6.5.10 - DoS 防护) ─────────────
limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=static:10m rate=50r/s;
limit_req_status 429;

# ── API 后端 upstream ──────────────────────────────────────
upstream api_backend {
    server 127.0.0.1:8080;    # ⚠️ 改为你的 API 地址
    keepalive 32;
}

# ================================================================
# HTTP → HTTPS 重定向（生产环境启用）
# ================================================================
# server {
#     listen 80;
#     server_name your-domain.com admin.your-domain.com;
#     return 301 https://$host$request_uri;
# }

# ================================================================
# 用户前台 / User Frontend
# ================================================================
server {
    listen 80;
    # listen 443 ssl http2;                      # 生产环境启用 HTTPS
    server_name _;                                # ⚠️ 改为你的域名

    # ── CIS Nginx 2.1 - 隐藏服务器版本 ────────────────────────
    server_tokens off;

    # ── TLS 配置 (PCI-DSS 4.1) ────────────────────────────────
    # ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    # ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    # ssl_protocols       TLSv1.2 TLSv1.3;
    # ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    # ssl_prefer_server_ciphers on;
    # ssl_session_cache   shared:SSL:10m;
    # ssl_session_timeout 1d;
    # ssl_session_tickets off;
    # ssl_stapling        on;
    # ssl_stapling_verify on;

    # ── 安全头 (OWASP / PCI-DSS 6.5.7) ────────────────────────
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=(), payment=()" always;
    # add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains; preload" always;  # HTTPS 启用后取消注释

    # CSP - 根据实际使用的外部资源调整
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://challenges.cloudflare.com https://telegram.org; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self'; frame-src https://challenges.cloudflare.com https://oauth.telegram.org; object-src 'none'; base-uri 'self'; form-action 'self';" always;

    # ── 前端静态文件 ──────────────────────────────────────────
    root /var/www/user/dist;
    index index.html;

    # ── 静态资源（JS/CSS/fonts — 长缓存）──────────────────────
    location ^~ /assets/ {
        limit_req zone=static burst=100 nodelay;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ── API 反向代理 (/api/) ──────────────────────────────────
    location /api/ {
        limit_req zone=api burst=40 nodelay;

        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
        proxy_send_timeout    30s;
        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 16 8k;
    }

    # ── 登录接口 — 更严格的限流 ───────────────────────────────
    location /api/v1/auth/login {
        limit_req zone=login burst=3 nodelay;

        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
    }

    location /api/v1/admin/login {
        limit_req zone=login burst=3 nodelay;

        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
    }

    # ── 上传文件代理 ──────────────────────────────────────────
    location /uploads/ {
        limit_req zone=static burst=100 nodelay;

        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 1h;
        add_header Cache-Control "public, max-age=3600" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ── 支付回调（不限流 — 外部支付平台） ────────────────────
    location /api/v1/payments/ {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
    }

    # ── SPA 路由回退 ─────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── 屏蔽敏感路径 ─────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~* \.(git|svn|env|bak|old|sql|conf|ini|log)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# ================================================================
# 管理后台 / Admin Frontend
# ================================================================
server {
    listen 81;                                    # 或使用子域名 + 443
    # listen 443 ssl http2;
    # server_name admin.your-domain.com;          # ⚠️ 改为你的管理后台域名
    # (TLS 配置同上)

    # ── CIS Nginx 2.1 - 隐藏服务器版本 ────────────────────────
    server_tokens off;

    # ── 安全头（管理后台更严格） ──────────────────────────────
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self'; frame-src https://challenges.cloudflare.com; object-src 'none'; base-uri 'self'; form-action 'self';" always;

    # ── IP 白名单（PCI-DSS 7.1 — 限制管理后台访问）──────────
    # ⚠️ 生产环境强烈建议启用：
    # allow 你的办公IP/32;
    # allow 10.0.0.0/8;
    # deny all;

    # ── 前端静态文件 ──────────────────────────────────────────
    root /var/www/admin/dist;
    index index.html;

    # ── 静态资源 ──────────────────────────────────────────────
    location ^~ /assets/ {
        limit_req zone=static burst=100 nodelay;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ── API 反向代理 ──────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=40 nodelay;

        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
    }

    # ── 管理员登录 — 严格限流 ─────────────────────────────────
    location /api/v1/admin/login {
        limit_req zone=login burst=2 nodelay;

        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
    }

    # ── 上传文件代理 ──────────────────────────────────────────
    location /uploads/ {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ── SPA 路由回退 ─────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── 屏蔽敏感路径 ─────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
