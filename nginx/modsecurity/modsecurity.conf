# ============================================================================
# ModSecurity Main Configuration — OWASP CRS for Dujiao-Next
# ============================================================================
# This is the ModSecurity configuration tuned for the Dujiao-Next platform.
# It uses OWASP Core Rule Set (CRS) v4.x with custom exclusions for the
# API's JSON-based workflow, payment callbacks, and file uploads.
#
# Deploy with: owasp/modsecurity-crs:nginx-alpine Docker image
# Or compile ModSecurity module into NGINX.
# ============================================================================

# ── Engine Settings ─────────────────────────────────────────
SecRuleEngine On

# ── Audit logging (PCI-DSS 10.1) ───────────────────────────
SecAuditEngine RelevantOnly
SecAuditLogRelevantStatus "^(?:5|4(?!04))"
SecAuditLogParts ABCFHZ
SecAuditLogType Serial
SecAuditLog /var/log/modsecurity/audit.log

# ── Request body handling ───────────────────────────────────
SecRequestBodyAccess On
SecRequestBodyLimit 20971520
SecRequestBodyNoFilesLimit 1048576
SecRequestBodyLimitAction Reject

# ── Response body handling ──────────────────────────────────
SecResponseBodyAccess Off

# ── Temporary files ─────────────────────────────────────────
SecTmpDir /tmp/modsecurity/tmp
SecDataDir /tmp/modsecurity/data

# ── Unicode mapping ─────────────────────────────────────────
SecUnicodeMapFile /etc/nginx/modsecurity/unicode.mapping 20127

# ── PCRE tuning ─────────────────────────────────────────────
SecPcreMatchLimit 500000
SecPcreMatchLimitRecursion 500000

# ── Debug log (disable in production) ───────────────────────
SecDebugLogLevel 0

# ============================================================================
# OWASP CRS Configuration
# ============================================================================

# Paranoia Level: 2 (Moderate — good balance of security and false positives)
# Level 1 = Low false positives, basic protection
# Level 2 = Moderate — recommended for most applications
# Level 3 = High — may require tuning
# Level 4 = Maximum — requires significant tuning
SecAction "id:900000, phase:1, pass, t:none, nolog, setvar:tx.blocking_paranoia_level=2"
SecAction "id:900001, phase:1, pass, t:none, nolog, setvar:tx.detection_paranoia_level=2"

# Anomaly scoring thresholds
SecAction "id:900110, phase:1, pass, t:none, nolog, \
  setvar:tx.inbound_anomaly_score_threshold=10, \
  setvar:tx.outbound_anomaly_score_threshold=5"

# Enforce body processor for JSON requests
SecAction "id:900200, phase:1, pass, t:none, nolog, setvar:tx.enforce_bodyproc_urlencoded=1"

# Response status codes to consider as anomaly
SecAction "id:900300, phase:1, pass, t:none, nolog, setvar:tx.allowed_methods=GET HEAD POST OPTIONS PUT PATCH DELETE"

# Allowed request content types
SecAction "id:900220, phase:1, pass, t:none, nolog, \
  setvar:'tx.allowed_request_content_type=|application/x-www-form-urlencoded| |multipart/form-data| |text/xml| |application/xml| |application/soap+xml| |application/json| |application/octet-stream|'"

# ============================================================================
# Custom Rule Exclusions for Dujiao-Next
# ============================================================================

# ── Exclude payment callback endpoints from WAF ────────────
# Payment providers (Alipay, WeChat, Stripe, PayPal) send signed callbacks
# that may trigger false positives. Signature verification is done at app level.
SecRule REQUEST_URI "@beginsWith /api/v1/payments/callback" \
  "id:10001, phase:1, pass, t:none, nolog, \
   ctl:ruleRemoveById=941100-941999, \
   ctl:ruleRemoveById=942100-942999, \
   ctl:ruleRemoveById=949110"

SecRule REQUEST_URI "@beginsWith /api/v1/payments/webhook/" \
  "id:10002, phase:1, pass, t:none, nolog, \
   ctl:ruleRemoveById=941100-941999, \
   ctl:ruleRemoveById=942100-942999, \
   ctl:ruleRemoveById=949110"

# ── Exclude file upload endpoint from body inspection ───────
# Upload validation (size, type, extension) is done at app level
SecRule REQUEST_URI "@beginsWith /api/v1/admin/upload" \
  "id:10003, phase:1, pass, t:none, nolog, \
   ctl:requestBodyAccess=Off"

# ── Exclude admin settings update (may contain HTML) ───────
# Rich text editor content in settings/posts/products
SecRule REQUEST_URI "@rx ^/api/v1/admin/(settings|posts|products|banners)" \
  "id:10004, phase:1, pass, t:none, nolog, \
   ctl:ruleRemoveById=941100-941160, \
   ctl:ruleRemoveById=941300-941340"

# ── Allow JSON content type for all API endpoints ──────────
SecRule REQUEST_URI "@beginsWith /api/" \
  "id:10005, phase:1, pass, t:none, nolog, \
   ctl:ruleRemoveById=920420"

# ── Exclude card secrets import (CSV upload) ───────────────
SecRule REQUEST_URI "@beginsWith /api/v1/admin/card-secrets/import" \
  "id:10006, phase:1, pass, t:none, nolog, \
   ctl:requestBodyAccess=Off"

# ── Exclude JWT tokens from SQL injection detection ────────
# Authorization header with Bearer tokens may trigger SQL-i rules
SecRule REQUEST_HEADERS:Authorization "@beginsWith Bearer " \
  "id:10007, phase:1, pass, t:none, nolog, \
   ctl:ruleRemoveTargetById=942100-942999;REQUEST_HEADERS:Authorization"

# ============================================================================
# Include OWASP CRS Rules
# ============================================================================
# These are loaded from the CRS installation directory.
# When using owasp/modsecurity-crs Docker image, rules are pre-installed.

# Include CRS setup
Include /etc/nginx/modsecurity/crs/crs-setup.conf

# Include all CRS rules
Include /etc/nginx/modsecurity/crs/rules/*.conf
