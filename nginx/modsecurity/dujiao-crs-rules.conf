# ============================================================================
# Dujiao-Next — OWASP CRS 自定义规则（追加到默认 CRS 之后）
# ============================================================================
#
# 本文件是针对 Dujiao-Next 整站编写的 OWASP CRS 追加规则，
# 覆盖 用户前台、管理后台、API 后端 全部组件。
#
# 你需要先安装并配置好默认的 OWASP CRS，然后将本文件 Include 到 CRS 之后：
#
#   安装步骤：
#   1. 安装 ModSecurity + OWASP CRS（推荐 v4.x）
#   2. 在 modsecurity.conf 中 Include 默认 CRS 规则
#   3. 在 CRS 规则之后 Include 本文件：
#      Include /etc/nginx/modsecurity/dujiao-crs-rules.conf
#
#   示例 modsecurity.conf 加载顺序：
#     SecRuleEngine On
#     Include /etc/nginx/modsecurity/crs/crs-setup.conf
#     Include /etc/nginx/modsecurity/crs/rules/*.conf
#     Include /etc/nginx/modsecurity/dujiao-crs-rules.conf    ← 本文件
#
# ============================================================================
# 规则 ID 范围: 10001-10199（自定义规则保留区间）
#
#   10001-10020  API 接口豁免规则
#   10050-10069  用户前端规则
#   10070-10089  管理后台规则
#   10100-10119  全站通用安全加固规则
# ============================================================================


# ╔══════════════════════════════════════════════════════════════╗
# ║  第一部分: API 后端接口豁免规则 (10001-10020)                  ║
# ╚══════════════════════════════════════════════════════════════╝

# ────────────────────────────────────────────────────────────
# 规则 10001-10002: 支付回调豁免
# ────────────────────────────────────────────────────────────
# 支付网关（支付宝/微信/Stripe/PayPal 等）发送的回调请求
# 包含签名数据，可能触发 XSS (941xxx) 和 SQLi (942xxx) 误报。
# 应用层已做签名验证，此处豁免 WAF 检测。

SecRule REQUEST_URI "@beginsWith /api/v1/payments/callback" \
  "id:10001, phase:1, pass, t:none, nolog, \
   ctl:ruleRemoveById=941100-941999, \
   ctl:ruleRemoveById=942100-942999, \
   ctl:ruleRemoveById=949110"

SecRule REQUEST_URI "@beginsWith /api/v1/payments/webhook/" \
  "id:10002, phase:1, pass, t:none, nolog, \
   ctl:ruleRemoveById=941100-941999, \
   ctl:ruleRemoveById=942100-942999, \
   ctl:ruleRemoveById=949110"


# ────────────────────────────────────────────────────────────
# 规则 10003: 文件上传豁免
# ────────────────────────────────────────────────────────────
# 管理后台图片上传接口（multipart/form-data）
# 应用层已做文件类型/大小/扩展名白名单验证。

SecRule REQUEST_URI "@beginsWith /api/v1/admin/upload" \
  "id:10003, phase:1, pass, t:none, nolog, \
   ctl:requestBodyAccess=Off"


# ────────────────────────────────────────────────────────────
# 规则 10004: 富文本内容豁免
# ────────────────────────────────────────────────────────────
# 管理后台编辑商品描述、文章内容、Banner、法律条款等包含 HTML，
# 会触发 XSS 规则误报。仅豁免特定 XSS 规则，保留 SQLi 检测。

SecRule REQUEST_URI "@rx ^/api/v1/admin/(settings|posts|products|banners)" \
  "id:10004, phase:1, pass, t:none, nolog, \
   ctl:ruleRemoveById=941100-941160, \
   ctl:ruleRemoveById=941300-941340"


# ────────────────────────────────────────────────────────────
# 规则 10005: JSON Content-Type 豁免
# ────────────────────────────────────────────────────────────
# 所有 API 接口使用 application/json，
# 避免 CRS 规则 920420 (不支持的 Content-Type) 误报。

SecRule REQUEST_URI "@beginsWith /api/" \
  "id:10005, phase:1, pass, t:none, nolog, \
   ctl:ruleRemoveById=920420"


# ────────────────────────────────────────────────────────────
# 规则 10006: 卡密批量导入豁免
# ────────────────────────────────────────────────────────────
# 管理后台卡密导入功能上传 CSV/文本文件。

SecRule REQUEST_URI "@beginsWith /api/v1/admin/card-secrets/import" \
  "id:10006, phase:1, pass, t:none, nolog, \
   ctl:requestBodyAccess=Off"


# ────────────────────────────────────────────────────────────
# 规则 10007: JWT Bearer Token 豁免
# ────────────────────────────────────────────────────────────
# Authorization: Bearer <token> 中的 JWT token 可能包含 base64
# 编码内容，会触发 SQLi 检测规则 (942xxx) 误报。

SecRule REQUEST_HEADERS:Authorization "@beginsWith Bearer " \
  "id:10007, phase:1, pass, t:none, nolog, \
   ctl:ruleRemoveTargetById=942100-942999;REQUEST_HEADERS:Authorization"


# ────────────────────────────────────────────────────────────
# 规则 10008: 验证码接口豁免
# ────────────────────────────────────────────────────────────
# 图片验证码和 Turnstile 验证接口可能包含特殊字符。

SecRule REQUEST_URI "@rx ^/api/v1/(public/captcha|auth/send-verify-code)" \
  "id:10008, phase:1, pass, t:none, nolog, \
   ctl:ruleRemoveById=942100-942999"


# ────────────────────────────────────────────────────────────
# 规则 10009: 管理后台优惠券/促销规则豁免
# ────────────────────────────────────────────────────────────
# 优惠券和促销规则的 JSON 配置可能包含复杂表达式。

SecRule REQUEST_URI "@rx ^/api/v1/admin/(coupons|promotions)" \
  "id:10009, phase:1, pass, t:none, nolog, \
   ctl:ruleRemoveById=942100-942200"


# ────────────────────────────────────────────────────────────
# 规则 10010: Telegram OAuth 回调豁免
# ────────────────────────────────────────────────────────────
# Telegram 登录回调包含签名哈希数据。

SecRule REQUEST_URI "@beginsWith /api/v1/auth/telegram" \
  "id:10010, phase:1, pass, t:none, nolog, \
   ctl:ruleRemoveById=942100-942999"


# ────────────────────────────────────────────────────────────
# 规则 10011: 推广链接追踪豁免
# ────────────────────────────────────────────────────────────
# 推广链接可能包含特殊字符的 referrer 和 landing path。

SecRule REQUEST_URI "@beginsWith /api/v1/public/affiliate/click" \
  "id:10011, phase:1, pass, t:none, nolog, \
   ctl:ruleRemoveById=941100-941999"


# ╔══════════════════════════════════════════════════════════════╗
# ║  第二部分: 用户前台安全规则 (10050-10069)                      ║
# ╚══════════════════════════════════════════════════════════════╝

# ────────────────────────────────────────────────────────────
# 规则 10050: 用户前台 SPA — 允许 HTML 响应
# ────────────────────────────────────────────────────────────
# Vue SPA 的 index.html 会触发出站 XSS 检测误报。
# 仅对 HTML 页面请求（非 API）豁免出站检测。

SecRule REQUEST_URI "!@beginsWith /api/" \
  "id:10050, phase:3, pass, t:none, nolog, \
   chain"
  SecRule RESPONSE_CONTENT_TYPE "@contains text/html" \
    "ctl:ruleRemoveById=951100-951999, \
     ctl:ruleRemoveById=953100-953999, \
     ctl:ruleRemoveById=959100"


# ────────────────────────────────────────────────────────────
# 规则 10051: 静态资源豁免 — JS/CSS/字体/图片
# ────────────────────────────────────────────────────────────
# Vite 构建的静态资源带 hash 文件名（/assets/index-a1b2c3.js），
# JS/CSS 内容会触发 XSS/SQLi 误报。完全豁免 WAF 检测。

SecRule REQUEST_URI "@rx ^/assets/.*\.(js|css|woff2?|ttf|eot|svg|png|jpg|gif|ico|webp)$" \
  "id:10051, phase:1, pass, t:none, nolog, \
   ctl:ruleEngine=Off"


# ────────────────────────────────────────────────────────────
# 规则 10052: 前台 favicon/robots/manifest 豁免
# ────────────────────────────────────────────────────────────
# 浏览器自动请求的标准文件。

SecRule REQUEST_URI "@rx ^/(favicon\.ico|robots\.txt|manifest\.json|sitemap\.xml)$" \
  "id:10052, phase:1, pass, t:none, nolog, \
   ctl:ruleEngine=Off"


# ────────────────────────────────────────────────────────────
# 规则 10053: 上传文件目录 — 限制文件类型
# ────────────────────────────────────────────────────────────
# /uploads/ 仅允许图片文件类型，拒绝其他所有请求。
# 防止通过 uploads 目录执行脚本或下载敏感文件。

SecRule REQUEST_URI "@beginsWith /uploads/" \
  "id:10053, phase:1, deny, status:403, t:none, log, \
   msg:'Blocked non-image file access in uploads', \
   chain"
  SecRule REQUEST_URI "!@rx \.(jpg|jpeg|png|gif|webp|svg|ico)$" ""


# ╔══════════════════════════════════════════════════════════════╗
# ║  第三部分: 管理后台安全规则 (10070-10089)                      ║
# ╚══════════════════════════════════════════════════════════════╝

# ────────────────────────────────────────────────────────────
# 规则 10070: 管理后台静态资源豁免
# ────────────────────────────────────────────────────────────
# 管理后台如果使用独立端口 (81) 或子域名，
# 其静态资源同样需要豁免。

# 注意：如果管理后台在独立端口/子域名部署，
# 此规则自动适用（/assets/ 路径与规则 10051 相同）。
# 如果管理后台使用路径前缀（如 /admin-panel/），取消下面的注释：
#
# SecRule REQUEST_URI "@rx ^/admin-panel/assets/.*\.(js|css|woff2?|ttf|eot|svg|png|jpg|gif|ico|webp)$" \
#   "id:10070, phase:1, pass, t:none, nolog, \
#    ctl:ruleEngine=Off"


# ────────────────────────────────────────────────────────────
# 规则 10071: 管理后台 API — 管理员操作日志不触发误报
# ────────────────────────────────────────────────────────────
# 管理员查看操作日志时，日志内容可能包含被拦截的恶意请求记录，
# 这些记录在响应中可能触发出站 XSS 检测。

SecRule REQUEST_URI "@beginsWith /api/v1/admin/logs" \
  "id:10071, phase:3, pass, t:none, nolog, \
   ctl:ruleRemoveById=951100-951999, \
   ctl:ruleRemoveById=953100-953999"


# ────────────────────────────────────────────────────────────
# 规则 10072: 管理后台 — 邮件模板编辑豁免
# ────────────────────────────────────────────────────────────
# 邮件模板包含 HTML 和模板变量（如 {{.OrderNo}}），
# 会触发 XSS 和注入规则。

SecRule REQUEST_URI "@beginsWith /api/v1/admin/settings/email" \
  "id:10072, phase:1, pass, t:none, nolog, \
   ctl:ruleRemoveById=941100-941999, \
   ctl:ruleRemoveById=942100-942200"


# ╔══════════════════════════════════════════════════════════════╗
# ║  第四部分: 全站通用安全加固规则 (10100-10119)                   ║
# ╚══════════════════════════════════════════════════════════════╝

# ────────────────────────────────────────────────────────────
# 规则 10100: 屏蔽敏感文件访问
# ────────────────────────────────────────────────────────────
# 阻止访问版本控制文件、配置文件、备份文件等。

SecRule REQUEST_URI "@rx (?i)\.(git|svn|env|bak|old|sql|conf|ini|log|yml|yaml|toml|db|sqlite)$" \
  "id:10100, phase:1, deny, status:403, t:none, log, \
   msg:'Blocked access to sensitive file type', \
   tag:'application-dujiao', \
   severity:'CRITICAL'"


# ────────────────────────────────────────────────────────────
# 规则 10101: 屏蔽隐藏文件/目录访问
# ────────────────────────────────────────────────────────────
# 阻止访问以 . 开头的隐藏文件和目录（如 .git/, .env）
# 排除 /api/v1.0/ 等合法版本化路径

SecRule REQUEST_URI "@rx /\.[a-zA-Z]" \
  "id:10101, phase:1, deny, status:403, t:none, log, \
   msg:'Blocked access to hidden file/directory', \
   tag:'application-dujiao', \
   severity:'CRITICAL'"


# ────────────────────────────────────────────────────────────
# 规则 10102: 屏蔽 Node.js/Go 源码目录访问
# ────────────────────────────────────────────────────────────
# 防止源代码泄露。

SecRule REQUEST_URI "@rx (?i)^/(node_modules|vendor|internal|cmd|src)/" \
  "id:10102, phase:1, deny, status:403, t:none, log, \
   msg:'Blocked access to source code directory', \
   tag:'application-dujiao', \
   severity:'CRITICAL'"


# ────────────────────────────────────────────────────────────
# 规则 10103: 屏蔽配置文件直接访问
# ────────────────────────────────────────────────────────────
# 阻止通过 URL 直接访问配置文件。

SecRule REQUEST_URI "@rx (?i)^/(config\.yml|config\.yaml|docker-compose\.ya?ml|Dockerfile|package\.json|go\.mod|go\.sum|Makefile)$" \
  "id:10103, phase:1, deny, status:403, t:none, log, \
   msg:'Blocked access to configuration file', \
   tag:'application-dujiao', \
   severity:'CRITICAL'"


# ────────────────────────────────────────────────────────────
# 规则 10104: 限制 HTTP 方法
# ────────────────────────────────────────────────────────────
# 只允许应用需要的 HTTP 方法，拒绝 TRACE/TRACK 等危险方法。

SecRule REQUEST_METHOD "!@rx ^(GET|HEAD|POST|PUT|PATCH|DELETE|OPTIONS)$" \
  "id:10104, phase:1, deny, status:405, t:none, log, \
   msg:'Blocked disallowed HTTP method: %{REQUEST_METHOD}', \
   tag:'application-dujiao', \
   severity:'WARNING'"


# ────────────────────────────────────────────────────────────
# 规则 10105: 阻止 PHP/ASP/JSP 探测
# ────────────────────────────────────────────────────────────
# 本站不使用 PHP/ASP/JSP，阻止常见扫描器探测。

SecRule REQUEST_URI "@rx (?i)\.(php|asp|aspx|jsp|cgi)($|\?)" \
  "id:10105, phase:1, deny, status:404, t:none, log, \
   msg:'Blocked scanner probe for server-side scripts', \
   tag:'application-dujiao', \
   severity:'WARNING'"


# ────────────────────────────────────────────────────────────
# 规则 10106: 阻止常见后门/Shell 探测路径
# ────────────────────────────────────────────────────────────
# 阻止已知后门文件名和扫描路径。

SecRule REQUEST_URI "@rx (?i)(wp-admin|wp-login|wp-content|phpMyAdmin|phpmyadmin|adminer|shell|c99|r57|webshell)" \
  "id:10106, phase:1, deny, status:404, t:none, log, \
   msg:'Blocked known exploit/scanner path', \
   tag:'application-dujiao', \
   severity:'WARNING'"


# ────────────────────────────────────────────────────────────
# 规则 10107: API 响应 Content-Type 强制检查
# ────────────────────────────────────────────────────────────
# API 响应必须是 application/json，防止 MIME 类型混淆攻击。

SecRule REQUEST_URI "@beginsWith /api/" \
  "id:10107, phase:3, pass, t:none, nolog, \
   chain"
  SecRule RESPONSE_CONTENT_TYPE "!@rx ^(application/json|text/plain)" \
    "log, msg:'API returned unexpected Content-Type: %{RESPONSE_CONTENT_TYPE}', \
     tag:'application-dujiao', \
     severity:'WARNING'"


# ────────────────────────────────────────────────────────────
# 规则 10108: 阻止 User-Agent 为空的请求
# ────────────────────────────────────────────────────────────
# 合法浏览器和 API 客户端都会发送 User-Agent。
# 豁免健康检查和支付回调（它们可能不发送 UA）。

SecRule REQUEST_HEADERS:User-Agent "@rx ^$" \
  "id:10108, phase:1, deny, status:403, t:none, log, \
   msg:'Blocked request with empty User-Agent', \
   tag:'application-dujiao', \
   severity:'NOTICE', \
   chain"
  SecRule REQUEST_URI "!@rx ^/(health|api/v1/payments/)" ""


# ╔══════════════════════════════════════════════════════════════╗
# ║  推荐的 CRS 全局配置（放在 crs-setup.conf 中）                ║
# ╚══════════════════════════════════════════════════════════════╝
# 以下是建议的 CRS 全局参数，供参考（不要写在本文件中，
# 写在 crs-setup.conf 或 modsecurity.conf 的 CRS 加载之前）：
